version: "3.9"

services:

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  worker:
    build: ./backend
    command: python -m app.workers.worker
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: leakos
      POSTGRES_PASSWORD: leakos
      POSTGRES_DB: leakos
    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - api
