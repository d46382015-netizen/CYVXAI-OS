name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Compatibility regression
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v5
     - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify legacy API compatibility
        run: |
          node ./api/index.js > /tmp/cyvx-api.log 2>&1 &
          API_PID!=
          trap 'kill $API_PID 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3000/status
          curl -fsS http://127.0.0.1:3000/api/v1/overview
          curl -fsS http://127.0.0.1:3000/api/v1/insights

      - name: Verify standalone Spark compatibility
        run: |
          SPARK_PORT=3100 node ./spark/server.js > /tmp/spark.log 2>&1 &
          SPARK_PID=$!
          trap 'kill $SPARK_PID 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3100/healthz >/dev/null; then break; fi
            sleep 1
          done
          BASE=http://127.0.0.1:3100
          CREATED="$(curl -fsS -X POST "$BASE/api/v1/sparks" -H 'content-type: application/json' -H 'idempotency-key: ci-compat-spark' -d '{"owner_id":"ci-founder","intention":"Launch a compatibility World","world":{"name":"CI Compatibility World"}}')"
          SPARK_ID="$(printf '%s' "$CREATED" | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).data.spark.id')"
          WORLD_ID="$(printf '%s' "$CREATED" | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).data.world.id')"
          curl -fsS -X POST "$BASE/api/v1/sparks/$SPARK_ID/approval" -H 'content-type: application/json' -d '{"owner_id":"ci-founder","decision":"approved"}' >/dev/null
          EXECUTED="$(curl -fsS -X POST "$BASE/api/v1/sparks/$SPARK_ID/execute" -H 'content-type: application/json' -d '{"owner_id":"ci-founder"}')"
          printf '%s' "$EXECUTED" | node -e 'const fs=require("fs");const x=JSON.parse(fs.readFileSync(0,"utf8"));if(x.data.world.status!=="operational")process.exit(1)'
          curl -fsS -X POST "$BASE/api/v1/worlds/$WORLD_ID/leads" -H 'content-type: application/json' -H 'idempotency-key: ci-compat-lead' -d '{"name":"CI Lead","email":"ci@example.com"}' >/dev/null
          curl -fsS "$BASE/metrics" | grep 'spark_leads_total 1'
