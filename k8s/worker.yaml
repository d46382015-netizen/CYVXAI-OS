apiVersion: apps/v1
kind: Deployment
metadata:
  name: leakos-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: python:3.10
          command: ["bash", "-c"]
          args:
            - echo "Worker running"; while true; do sleep 5; done
