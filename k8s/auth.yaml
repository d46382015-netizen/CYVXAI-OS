apiVersion: apps/v1
kind: Deployment
metadata:
  name: leakos-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: python:3.10
          command: ["bash", "-c"]
          args:
            - pip install fastapi uvicorn && uvicorn services.auth.main:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: auth
spec:
  selector:
    app: auth
  ports:
    - port: 8000
      targetPort: 8000
