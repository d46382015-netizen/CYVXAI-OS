name: CYVXAI CI

on:
  push:
    branches:
      - master

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Validate FastAPI
        run: |
          python -m py_compile backend/main.py
