services:

  backend:
    build: ./backend

    container_name: cyvxai-backend

    restart: always

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs

    depends_on:
      - postgres
      - redis

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16

    container_name: cyvxai-postgres

    restart: always

    environment:
      POSTGRES_USER: cyvxai
      POSTGRES_PASSWORD: cyvxai
      POSTGRES_DB: cyvxai

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    container_name: cyvxai-redis

    restart: always

    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest

    container_name: cyvxai-nginx

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend
