<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UEF Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #111a33;
      --panel-2: #0f1730;
      --text: #e8ecff;
      --muted: #95a0c8;
      --accent: #7cf7d4;
      --line: rgba(124, 247, 212, 0.18);
      --danger: #ff8a8a;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 247, 212, 0.13), transparent 30%),
        radial-gradient(circle at bottom right, rgba(102, 126, 234, 0.18), transparent 28%),
        var(--bg);
      color: var(--text);
    }
    header, main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: -0.04em;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      max-width: 72ch;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }
    .panel {
      background: linear-gradient(180deg, rgba(17, 26, 51, 0.96), rgba(10, 17, 35, 0.96));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.26);
    }
    textarea {
      width: 100%;
      min-height: 280px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 16px;
      box-sizing: border-box;
      font: inherit;
      resize: vertical;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--accent);
      color: #05111a;
      font-weight: 700;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 12px;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.5;
      color: #dbe5ff;
    }
    .events {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .event {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
    }
    .event .meta {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
    }
    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      background: rgba(124, 247, 212, 0.1);
      color: var(--accent);
      font-size: 12px;
    }
    .state-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .kv {
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      padding: 12px;
    }
    .kv .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .error {
      color: var(--danger);
      margin-top: 10px;
    }
    @media (max-width: 960px) {
      .grid {
        grid-template-columns: 1fr;
      }
      header {
        flex-direction: column;
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>UEF Viewer</h1>
      <div class="subtitle">Replay a causal execution ledger. This is the minimal adoption surface: paste an event stream, rebuild state, inspect causality, and fork from there.</div>
    </div>
    <div class="pill">Execution Replay Layer</div>
  </header>
  <main>
    <div class="grid">
      <section class="panel">
        <h2>Event Stream</h2>
        <textarea id="source"></textarea>
        <div>
          <button id="replayBtn">Replay</button>
          <button id="sampleBtn">Load Sample</button>
        </div>
        <div id="error" class="error"></div>
      </section>
      <section class="panel">
        <h2>Replayed State</h2>
        <div class="state-grid" id="state"></div>
        <h3>Causal Edges</h3>
        <pre id="edges"></pre>
      </section>
    </div>
    <section class="panel" style="margin-top: 20px;">
      <h2>Timeline</h2>
      <div class="events" id="timeline"></div>
    </section>
  </main>
  <script>
    const sample = [
      { id: "evt_001", ts: 1710000000, run_id: "run_123", type: "SET", actor: "node-1", key: "alpha", value: 1, caused_by: [], meta: { latency_ms: 12, host: "node-1" } },
      { id: "evt_002", ts: 1710000001, run_id: "run_123", type: "CALL", actor: "agent-x", value: { name: "compute" }, caused_by: ["evt_001"], meta: { latency_ms: 4, host: "node-1" } },
      { id: "evt_003", ts: 1710000002, run_id: "run_123", type: "RETURN", actor: "agent-x", value: { ok: true }, caused_by: ["evt_002"], meta: { latency_ms: 2, host: "node-1" } }
    ];

    const source = document.getElementById("source");
    const timeline = document.getElementById("timeline");
    const stateEl = document.getElementById("state");
    const edgesEl = document.getElementById("edges");
    const errorEl = document.getElementById("error");

    function sortEvents(events) {
      return [...events].sort((a, b) => (a.ts - b.ts) || ((a.sequence || 0) - (b.sequence || 0)) || String(a.id || "").localeCompare(String(b.id || "")));
    }

    function replay(events) {
      const ordered = sortEvents(events);
      const state = {};
      const edges = [];
      for (const event of ordered) {
        if (event.type === "SET" || event.type === "STATE") {
          if (event.key != null) state[event.key] = event.value;
          else state[event.id] = event.value;
        } else if (event.type === "CALL") {
          state.last_call = event.value ?? null;
        } else if (event.type === "RETURN") {
          state.last_return = event.value ?? null;
        } else if (event.type === "ERROR") {
          state.last_error = event.value ?? null;
        }
        for (const cause of event.caused_by || []) {
          edges.push({ from: cause, to: event.id, type: "causal" });
        }
      }
      return { state, edges, ordered };
    }

    function render() {
      errorEl.textContent = "";
      try {
        const events = JSON.parse(source.value || "[]");
        const result = replay(events);
        stateEl.innerHTML = Object.entries(result.state).map(([key, value]) => `
          <div class="kv">
            <div class="k">${key}</div>
            <div><pre>${escapeHtml(JSON.stringify(value, null, 2))}</pre></div>
          </div>
        `).join("") || '<div class="kv"><div class="k">State</div><div>Empty</div></div>';
        timeline.innerHTML = result.ordered.map((event) => `
          <div class="event">
            <div class="meta">
              <span>${escapeHtml(event.id)}</span>
              <span>${escapeHtml(event.type)}</span>
              <span>run ${escapeHtml(event.run_id || "")}</span>
              <span>actor ${escapeHtml(event.actor || "")}</span>
            </div>
            <pre>${escapeHtml(JSON.stringify(event, null, 2))}</pre>
          </div>
        `).join("");
        edgesEl.textContent = JSON.stringify(result.edges, null, 2);
      } catch (error) {
        errorEl.textContent = error.message;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    document.getElementById("replayBtn").addEventListener("click", render);
    document.getElementById("sampleBtn").addEventListener("click", () => {
      source.value = JSON.stringify(sample, null, 2);
      render();
    });

    source.value = JSON.stringify(sample, null, 2);
    render();
  </script>
</body>
</html>
