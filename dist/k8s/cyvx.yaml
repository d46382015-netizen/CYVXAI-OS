apiVersion: v1
kind: Namespace
metadata:
  name: cyvx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cyvx-config
  namespace: cyvx
data:
  CYVX_HOST: "0.0.0.0"
  CYVX_PORT: "3000"
  CYVX_RATE_LIMIT: "120"
  CYVX_PUBLIC_HOST: "cyvx-ui.cyvx.svc.cluster.local"
  RAFT_PORT: "7000"
  RAFT_CLUSTER_SIZE: "3"
  RAFT_HEADLESS_SERVICE: "cyvx-cluster"
  RAFT_PEERS: "cyvx-cluster-0.cyvx-cluster.cyvx.svc.cluster.local,cyvx-cluster-1.cyvx-cluster.cyvx.svc.cluster.local,cyvx-cluster-2.cyvx-cluster.cyvx.svc.cluster.local"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cyvx-data
  namespace: cyvx
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cyvx-cluster
  namespace: cyvx
spec:
  clusterIP: None
  selector:
    app: cyvx-cluster
  ports:
    - name: http
      port: 7000
      targetPort: 7000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cyvx-cluster
  namespace: cyvx
spec:
  serviceName: cyvx-cluster
  replicas: 3
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: cyvx-cluster
  template:
    metadata:
      labels:
        app: cyvx-cluster
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: cyvx-cluster
              topologyKey: kubernetes.io/hostname
      containers:
        - name: cluster
          image: cyvx/cluster:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7000
              name: http
          envFrom:
            - configMapRef:
                name: cyvx-config
          env:
            - name: ROLE
              value: raft
            - name: NODES
              value: "3"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RAFT_NAMESPACE
              value: cyvx
          readinessProbe:
            httpGet:
              path: /raft/health
              port: 7000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/cyvx
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cyvx-cluster-pdb
  namespace: cyvx
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cyvx-cluster
---
apiVersion: v1
kind: Service
metadata:
  name: cyvx-api
  namespace: cyvx
spec:
  selector:
    app: cyvx-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyvx-api
  namespace: cyvx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyvx-api
  template:
    metadata:
      labels:
        app: cyvx-api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cyvx-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: cyvx/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: cyvx-config
          env:
            - name: CYVX_DB
              value: /var/lib/cyvx/cyvx.db
          readinessProbe:
            httpGet:
              path: /raft/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/cyvx
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cyvx-data
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cyvx-api-pdb
  namespace: cyvx
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cyvx-api
---
apiVersion: v1
kind: Service
metadata:
  name: cyvx-ui
  namespace: cyvx
spec:
  selector:
    app: cyvx-ui
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyvx-ui
  namespace: cyvx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyvx-ui
  template:
    metadata:
      labels:
        app: cyvx-ui
    spec:
      containers:
        - name: ui
          image: cyvx/ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: API_URL
              value: http://cyvx-api.cyvx.svc.cluster.local:3000
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
