services:

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  worker:
    build: ./backend

    command: python app/workers/worker.py

    depends_on:
      - redis

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./infra/proxy/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend
