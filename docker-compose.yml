services:

  backend:
    build: ./backend

    container_name: cyvxai-backend

    restart: always

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs

    depends_on:
      - redis

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7

    container_name: cyvxai-redis

    restart: always

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

  worker:
    build: ./backend

    container_name: cyvxai-worker

    restart: always

    command: python app/workers/worker.py

    depends_on:
      - redis

  nginx:
    image: nginx:latest

    container_name: cyvxai-nginx

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./infra/proxy/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend
